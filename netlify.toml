[build]
  command = "npm run build"
  publish = "dist"

# SPA fallback: todas las rutas apuntan a index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Assets con hash (JS, CSS): caché agresiva de 1 año
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# index.html: sin caché para siempre recibir la versión más reciente
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# Headers de seguridad globales (mejoran Best Practices en Lighthouse)
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
